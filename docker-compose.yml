name: merdeka-upg

services:
  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-https://merdeka.farlabs.my.id}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DOWNLOAD_TOKEN_SECRET: ${DOWNLOAD_TOKEN_SECRET:?DOWNLOAD_TOKEN_SECRET is required}
      PHOTO_STORAGE_PATH: /data/photos
      CLOUDFLARE_ACCESS_TEAM_DOMAIN: ${CLOUDFLARE_ACCESS_TEAM_DOMAIN:-}
      CLOUDFLARE_ACCESS_AUDIENCE: ${CLOUDFLARE_ACCESS_AUDIENCE:-}
    expose:
      - "8000"
    volumes:
      - ./data/photos:/data/photos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_HTTP_PORT:-8010}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

